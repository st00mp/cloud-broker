services:
  web:
    build: .
    container_name: symfony-web
    restart: unless-stopped
    volumes:
      - ./:/var/www/symfony # Bind mount pour synchroniser le code local avec le conteneur
    ports:
      - "8080:80"
    environment:
      APP_ENV: dev
    depends_on:
      - db

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: symfony-nginx
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/symfony # Bind mount pour synchroniser le code local avec le conteneur
    depends_on:
      - web

  db:
    image: mysql:8.0
    container_name: symfony-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: symfony
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: arm64v8/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8083:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

volumes:
  mysql_data:
  symfony_code:


