services:
  symfony-backend:
    build:
      context: ./backend
    container_name: symfony-backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/symfony
    ports:
      - "9000:9000"
    environment:
      APP_ENV: dev
    depends_on:
      - db

  nginx:
    build:
      context: ./backend
      dockerfile: Dockerfile.nginx
    container_name: symfony-nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - symfony-backend

  db:
    image: mysql:8.0
    container_name: symfony-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: symfony
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: arm64v8/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8083:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextjs-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - symfony-backend
      - db

volumes:
  mysql_data:
  symfony_code:


